{% extends "base.html" %}
{% block title %}User{% endblock %}
{% block content %}
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert">
                <button type="button" class="close" data-dismiss="alert">&times;</button>
                <strong>Hey!</strong> {{msg}}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <p>Welcome {{user}}</p>
{% endblock %}
